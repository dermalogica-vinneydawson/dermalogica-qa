name: Website QA Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Manual trigger from the Actions tab
  schedule:
    - cron: '0 16 * * 1' # Every Monday at 8:00 AM PST / 16:00 UTC

# Permissions required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install dependencies
      run: npm install
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test --project=chromium
      continue-on-error: true  # Don't fail the whole workflow if tests fail
      env:
        QA_USER_EMAIL: ${{ secrets.QA_USER_EMAIL }}
        QA_USER_PASSWORD: ${{ secrets.QA_USER_PASSWORD }}
        
    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-qa-report
        path: reports/html/
        retention-days: 30

    - name: Upload JSON Telemetry
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: qa-json-report
        path: reports/json/
        retention-days: 30

    - name: Upload Failed Test Videos
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: failed-test-videos
        path: test-results/
        retention-days: 30
        if-no-files-found: ignore

    - name: Build QA Dashboard
      if: ${{ !cancelled() }}
      run: |
        cd qa-dashboard
        npm install
        node sync-data.cjs
        npm run build

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      if: ${{ !cancelled() }}
      with:
        path: ./qa-dashboard/dist

  deploy:
    needs: test
    if: ${{ !cancelled() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
